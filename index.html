<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusCRM Pro - Secure Authentication Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #f8fafc;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
    </style>
</head>
<body>

    <div class="auth-gate-container">
        <div style="background: #ffffff; border: 1px solid rgba(0,0,0,0.08); padding: 2.5rem; border-radius: 8px; width: 350px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="width: 50px; height: 50px; background: #3b82f6; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.5rem; border-radius: 8px; margin: 0 auto 1rem;">N</div>
                <h2 style="color: #1e293b; margin: 0; font-size: 1.5rem;">Nexus<span style="color: #3b82f6;">CRM</span> Access</h2>
                <p style="color: #64748b; margin: 0.5rem 0 0; font-size: 0.85rem;">Identity verification required for terminal access.</p>
            </div>
            
            <form id="secure-login-form">
                <div style="margin-bottom: 1.25rem;">
                    <label style="display: block; color: #64748b; font-size: 0.75rem; text-transform: uppercase; font-weight: 600; margin-bottom: 0.5rem;">System Identifier</label>
                    <input type="text" id="login-username" required placeholder="e.g., nexus executive" style="width: 100%; background: #f1f5f9; border: 1px solid rgba(0,0,0,0.1); color: #1e293b; padding: 10px; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem;">
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; color: #64748b; font-size: 0.75rem; text-transform: uppercase; font-weight: 600; margin-bottom: 0.5rem;">Access Code Key</label>
                    <input type="password" id="login-password" required placeholder="••••••••" style="width: 100%; background: #f1f5f9; border: 1px solid rgba(0,0,0,0.1); color: #1e293b; padding: 10px; border-radius: 4px; box-sizing: border-box; font-size: 0.9rem;">
                </div>

                <div id="auth-error-message" style="color: #ef4444; font-size: 0.8rem; margin-bottom: 1rem; display: none; text-align: center;">
                    🛑 Invalid identifier or security clearance keys.
                </div>

                <button type="submit" style="width: 100%; background: #3b82f6; color: #fff; border: none; padding: 12px; font-weight: 600; border-radius: 4px; cursor: pointer; transition: background 0.2s; margin-bottom: 1.5rem;">
                     Login 
                </button>
            </form>

            <div style="background: rgba(59, 130, 246, 0.05); border: 1px dashed rgba(59, 130, 246, 0.25); padding: 12px; border-radius: 6px;">
                <span style="display: block; font-size: 0.7rem; color: #3b82f6; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px;">💻 Sandbox Testing Environment Keys:</span>
                <div style="font-size: 0.8rem; color: #475569; display: flex; flex-direction: column; gap: 4px; font-family: monospace;">
                    <div><span style="color: #64748b;">User:</span> <strong style="color: #1e293b;">nexus</strong></div>
                    <div><span style="color: #64748b;">Pass:</span> <strong style="color: #1e293b;">nexus2026</strong></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('secure-login-form').addEventListener('submit', (event) => {
            event.preventDefault();
            const userInput = document.getElementById('login-username').value.trim();
            const passwordInput = document.getElementById('login-password').value;
            const errorMsg = document.getElementById('auth-error-message');

            if (userInput === 'nexus' && passwordInput === 'nexus2026') {
                sessionStorage.setItem('nexus_admin_auth', 'true');
                if (errorMsg) errorMsg.style.display = 'none';
                window.location.href = 'dashboard.html'; 
            } else {
                if (errorMsg) errorMsg.style.display = 'block';
                document.getElementById('login-password').value = '';
            }
        });
    </script>
</body>
</html>
